# Railway/Nixpacks build config: install system Chromium for Puppeteer so the
# headless-browser skill works, and point Puppeteer at it (skip its own download).
[phases.setup]
aptPkgs = [
  "chromium",
  "fonts-liberation",
  "libnss3",
  "libatk-bridge2.0-0",
  "libatk1.0-0",
  "libcups2",
  "libgtk-3-0",
  "libgbm1",
  "libasound2",
  "libxss1",
  "libxshmfence1",
]

[variables]
PUPPETEER_SKIP_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium"
